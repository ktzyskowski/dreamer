device: cuda
warmup_steps: 1_024
replay_ratio: 32
batch_size: 16
sequence_length: 64

environment:
  name: ALE/Breakout-v5
  action_repeat: 4
  # resize observations
  obs_width: 64
  obs_height: 64

two_hot:
  n_bins: 255
  low: -20
  high: 20

replay_buffer:
  capacity: 1_000_000
  # capacity: 5_000_000
  dtype: uint8

# Models ========================================================== #

world_model:
  learning_rate: 3e-4
  dream_horizon: 15
  n_dreams: 16

  recurrent_size: 128
  n_categoricals: 32
  n_classes: 32

  encoder:
    kernel_size: 3
    stride: 2
    padding: 0
  posterior_net:
    hidden_dims: [128, 128]
  prior_net:
    hidden_dims: [128, 128]
  reward_predictor:
    hidden_dims: [128, 128]
  continue_predictor:
    hidden_dims: [128, 128]
  recurrent_model:
    n_blocks: 8

actor:
  learning_rate: 3e-4
  hidden_dims: [128, 128]

critic:
  learning_rate: 1e-4
  hidden_dims: [128, 128]

# Loss Functions ================================================== #

world_model_loss:
  beta_posterior: 0.1
  beta_prior: 1.0
  beta_prediction: 1.0
  free_nats: 1.0

actor_critic_loss:
  # advantage normalization hyperparameters
  ema_decay: 0.99

  # entropy regularization
  eta: 3e-4

  # trace decay factor
  lamda: 0.95

  # discount factor
  gamma: 0.997
