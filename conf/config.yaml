# Torch --------------------------------------------------------------------- #

torch:
  # torch device
  device: cuda
  # comment this out if unavailable on your machine
  float32_matmul_precision: high

# Environment --------------------------------------------------------------- #

environment:
  # "vector" or "pixel"
  type: vector
  # environment name
  name: CartPole-v1
  # number of times action is repeated in environment before next observation
  # is returned
  action_repeat: 1

# Symlog two-hot encoding --------------------------------------------------- #

two_hot:
  # lower bound of bins (in symlog space)
  low: -20
  # upper bound of bins (in symlog space)
  high: 20.0
  # number of bins (dimension of encoding)
  n_bins: 255

# Replay buffer ------------------------------------------------------------- #

replay_buffer:
  # total capacity, in timesteps
  capacity: 1_000_000
  # dtype of observation and action data points
  dtype: float32

# Models -------------------------------------------------------------------- #

# world model parameters
world_model:
  # learning rate
  learning_rate: 0.0003

  # number of latent state categoricals and classes per categorical
  n_categoricals: 16
  n_classes: 16

  # encoder parameters
  encoder:
    # MLP is used in vector environments
    mlp:
      hidden_dims: [ 128, 128 ]
      activation: rmsnorm_silu
    # CNN is used in pixel (image) environments
    cnn:
      padding: 1
      stride: 1
      kernel_size: 3
      activation: rmsnorm_silu
      channels: [ 32, 64, 128, 256 ]

  # posterior (post-encoder) net MLP parameters
  posterior_net:
    hidden_dims: [ 128, 128 ]
    activation: rmsnorm_silu

  # prior (dynamics) net MLP parameters
  prior_net:
    hidden_dims: [ 128, 128 ]
    activation: rmsnorm_silu

  # recurrent net parameters
  recurrent_net:
    recurrent_size: 128
    n_blocks: 1

# reward predictor MLP parameters
reward_predictor:
  hidden_dims: [ 128, 128 ]
  activation: rmsnorm_silu

# continue predictor MLP parameters
continue_predictor:
  hidden_dims: [ 128, 128 ]
  activation: rmsnorm_silu

actor:
  # actor learning rate
  learning_rate: 0.0003

  # actor MLP parameters
  net:
    hidden_dims: [ 128, 128 ]
    activation: rmsnorm_silu

critic:
  # critic learning rate
  learning_rate: 0.0001

  # EMA decay controlling how quickly fast critic weights converge to slow critic weights
  ema_decay: 0.98

  # critic MLP parameters
  net:
    hidden_dims: [ 128, 128 ]
    activation: rmsnorm_silu

dreamer:
  # number of timesteps per dream rollout (excluding real seed observation)
  dream_horizon: 15

# Loss Functions ------------------------------------------------------------ #

world_model_loss:
  # weight assigned to posterior KL divergence loss term (encoder)
  beta_posterior: 0.1

  # weight assigned to prior KL divergence loss term (dynamics)
  beta_prior: 1.0

  # weight assigned to predictor loss (reward, continue, observation)
  beta_prediction: 1.0

  # free nats regularizer on KL terms (optimizer will not push beyond this lower bound)
  free_nats: 1.0

actor_critic_loss:
  # reward discount factor
  discount: 0.99

  # lambda-return trace decay factor
  # tend towards 0 => equivalent to TD(0), only use critic value as return estimate
  # tend towards 1 => equivalent to Monte Carlo, only use actual episodic return (with critic bootstrap beyond trajectory)
  trace_decay: 0.95

  # policy entropy regularization factor
  entropy_coefficient: 0.0003

  # regularizer pull towards slow critic values
  slow_regularization_weight: 1.0

  # EMA decay for advantage normalizer term in REINFORCE loss
  advantage_norm_decay: 0.99

  # weight assigned to dream rollout critic loss
  beta_critic_dream: 1.0

  # weight assigned to real (sampled from replay buffer) rollout critic loss
  # (value annotations from dream lambda returns at seed observations)
  beta_critic_real: 0.3

# Training ------------------------------------------------------------------ #

training:
  # number of environment steps to collect (and train on)
  n_steps: 30_000

  # batch size
  batch_size: 32

  # number of timesteps in sampled trajectory
  sequence_length: 64

  # number of environment steps collected with initial (random) policy prior to training
  warmup_steps: 5_000

  # number of gradient steps per environment step
  replay_ratio: 2

  # gradient clipping upper norm
  grad_clip: 1000.0

  # checkpoint directory
  checkpoint_dir: checkpoints

  # checkpoint frequency
  save_every_n_gradient_steps: 2_500

  # number of episodes generated during each evaluation
  n_eval_episodes: 5
